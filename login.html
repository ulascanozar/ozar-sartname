<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script>
try {
  const s = JSON.parse(sessionStorage.getItem('ozar_session') || '{}');
  if (s.ok && s.exp > Date.now()) {
    location.replace('app.html');
  } else {
    location.replace('login.html');
  }
} catch(e) { location.replace('login.html'); }
</script>
</head><body></body></html>
