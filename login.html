<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — ÖZAR Şartname Aracı</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap');
:root {
  --acc: #3b2db6; --acc2: #d7261e;
  --bg: #f0f2f7; --card: #fff; --brd: #e2e6f0;
  --tx: #0f172a; --tx2: #64748b; --tx3: #94a3b8;
  --grn: #059669; --red: #dc2626;
  --sans: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans); background: var(--bg);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
body::before {
  content: ''; position: fixed; top: -30%; left: -20%; width: 70%; height: 70%;
  background: radial-gradient(ellipse, rgba(59,45,182,.09) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: ''; position: fixed; bottom: -20%; right: -10%; width: 50%; height: 60%;
  background: radial-gradient(ellipse, rgba(215,38,30,.06) 0%, transparent 70%);
  pointer-events: none;
}
.card {
  background: var(--card); border: 1px solid var(--brd); border-radius: 20px;
  padding: 48px; width: 400px; max-width: calc(100vw - 32px);
  box-shadow: 0 20px 60px rgba(59,45,182,.12), 0 4px 12px rgba(0,0,0,.06);
  position: relative; z-index: 1;
}
.logo-wrap { text-align: center; margin-bottom: 28px; }
.logo-img {
  height: 40px; width: auto;
  /* Siyah arka planlı logoyu renkli göster */
  filter: brightness(0) saturate(100%)
    invert(14%) sepia(68%) saturate(2000%) hue-rotate(228deg) brightness(80%);
}
.app-tag {
  display: block; margin-top: 8px; font-size: 11px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--tx3);
}
.divider { height: 1px; background: var(--brd); margin: 22px 0; }
h2 { font-size: 20px; font-weight: 700; color: var(--tx); margin-bottom: 6px; }
p { font-size: 13px; color: var(--tx2); line-height: 1.6; margin-bottom: 22px; }
label { display: block; font-size: 12px; font-weight: 600; color: var(--tx); margin-bottom: 6px; }
.input-wrap { position: relative; margin-bottom: 16px; }
input[type=password] {
  width: 100%; padding: 11px 42px 11px 14px;
  background: #f8fafc; border: 1.5px solid var(--brd); border-radius: 10px;
  font-family: var(--sans); font-size: 14px; color: var(--tx);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
input[type=password]:focus { border-color: var(--acc); box-shadow: 0 0 0 3px rgba(59,45,182,.1); }
.eye-btn {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--tx3); font-size: 16px; padding: 2px;
  transition: color .15s;
}
.eye-btn:hover { color: var(--tx2); }
.btn {
  width: 100%; padding: 13px; background: var(--acc); color: #fff;
  border: none; border-radius: 10px; font-family: var(--sans); font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn:hover { background: #2f24a0; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(59,45,182,.3); }
.btn:active { transform: none; }
.btn:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }
.err {
  font-size: 12px; padding: 10px 13px; border-radius: 8px; margin-top: 12px;
  background: #fef2f2; color: var(--red); border: 1px solid #fecaca;
  font-weight: 500; display: none; align-items: center; gap: 7px;
}
.err.on { display: flex; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
.shake { animation: shake .35s ease; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img class="logo-img" src="assets/logo.png" alt="ÖZAR Group"
      onerror="this.style.display='none';document.getElementById('logoText').style.display='block'">
    <span id="logoText" style="display:none;font-family:var(--mono);font-size:20px;font-weight:600;color:var(--acc);letter-spacing:3px">ÖZAR</span>
    <span class="app-tag">Şartname İşleme Aracı</span>
  </div>
  <div class="divider"></div>

  <h2>Giriş Yap</h2>
  <p>Erişim şifrenizi girin.</p>

  <div>
    <label for="pw">Şifre</label>
    <div class="input-wrap">
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" autofocus>
      <button class="eye-btn" type="button" onclick="togglePw()" id="eyeBtn">👁</button>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Giriş Yap</button>
    <div class="err" id="errMsg">⚠ Şifre hatalı. Tekrar deneyin.</div>
  </div>
</div>

<script>
// ── Şifre: SHA-256 hash olarak saklanır
// Varsayılan şifre: ozar2024
// Değiştirmek için: https://emn178.github.io/online-tools/sha256.html
// adresine yeni şifrenizi yazın, hash'i PASS_HASH'e yapıştırın.
const PASS_HASH = 'f5fca5394e63f4334202411c84af307af6b4f0a4da9a3e8844fe305cf7b414e4';
// ↑ Bu "ozar2024" şifresinin hash'i. Değiştirmek için aşağıya bakın.
// Gerçek hash'i almak için aşağıdaki setup fonksiyonunu kullanın.

// İlk kurulumda gerçek hash'i console'a yazdır:
async function getHash(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Giriş kontrolü
async function doLogin() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  // Küçük gecikme (brute-force önlemi)
  await new Promise(r => setTimeout(r, 400));

  const hash = await getHash(pw);
  
  // Hash kontrolü
  if (hash === PASS_HASH) {
    // Oturum aç — 8 saat geçerli
    sessionStorage.setItem('ozar_session', JSON.stringify({
      ok: true,
      exp: Date.now() + 8 * 60 * 60 * 1000
    }));
    btn.innerHTML = '✓ Yönlendiriliyor…';
    setTimeout(() => location.replace('/app.html'), 500);
  } else {
    const card = document.querySelector('.card');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
    const err = document.getElementById('errMsg');
    err.classList.add('on');
    btn.disabled = false;
    btn.innerHTML = 'Giriş Yap';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

function togglePw() {
  const inp = document.getElementById('pw');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
  document.getElementById('errMsg').classList.remove('on');
});

// Zaten giriş yapılmışsa yönlendir
try {
  const s = JSON.parse(sessionStorage.getItem('ozar_session') || '{}');
  if (s.ok && s.exp > Date.now()) location.replace('/app.html');
} catch(e) {}

// ── KURULUM YARDIMCISI ──────────────────────────────
// Tarayıcı konsolunda (F12) şunu çalıştırın:
//   setPassword('yeni_sifreniz')
// Çıkan hash'i PASS_HASH değişkenine yapıştırın.
window.setPassword = async (pw) => {
  const h = await getHash(pw);
  console.log('%cYeni PASS_HASH:', 'color:#3b2db6;font-weight:bold;font-size:14px');
  console.log('%c' + h, 'color:#059669;font-size:16px;font-family:monospace');
  console.log('login.html dosyasında PASS_HASH değerini bu ile değiştirin.');
};
console.log('%cŞifre değiştirmek için: setPassword("yeni_sifre")', 'color:#94a3b8');
</script>
</body>
</html>
